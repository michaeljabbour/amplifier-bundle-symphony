bundle:
  name: symphony-behavior
  version: 0.1.0
  description: Wires Symphony tool, agents, and context

tools:
  - module: tool-symphony
    source: ../modules/tool-symphony
    config:
      symphony_url: http://localhost:4000
      timeout_seconds: 30
      connect_timeout_seconds: 5

agents:
  include:
    - symphony:agents/symphony-expert
    - symphony:agents/symphony-operator

context:
  include:
    - symphony:context/symphony-awareness.md
